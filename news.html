<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konang News - Yayasan Sekola Konang</title>
    
    <!-- Library CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #c6ff00; --dark: #050505; --card-bg: #121212; --sk-orange: #ffab00; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: #eee; padding-bottom: 50px; }

        /* --- HEADER & HERO --- */
        .hero-news { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1501183638710-841dd1904471?q=80&w=2070') center/cover;
            padding: 80px 0 60px; text-align: center; border-bottom: 3px solid var(--accent);
        }
        .konang-badge { background: var(--accent); color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }

        /* --- FILTER TAB --- */
        .filter-container { margin-top: -25px; display: flex; justify-content: center; gap: 10px; }
        .btn-filter { 
            background: #1a1a1a; color: #888; border: 1px solid #333; 
            padding: 10px 25px; border-radius: 50px; font-weight: 700; font-size: 0.7rem; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-filter.active { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 15px rgba(198, 255, 0, 0.4); }
        .btn-filter:hover:not(.active) { color: white; border-color: var(--accent); }

        /* --- NEWS CARDS --- */
        .news-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            border: 1px solid #222; transition: 0.4s; height: 100%; 
            position: relative;
        }
        .news-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .news-img-wrapper { position: relative; height: 200px; overflow: hidden; }
        .news-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .news-card:hover .news-img { scale: 1.1; }

        .type-badge { position: absolute; top: 15px; left: 15px; z-index: 10; font-size: 0.6rem; font-weight: 800; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; }
        .bg-internal { background: var(--accent); color: black; }
        .bg-external { background: #0277bd; color: white; }

        .news-body { padding: 25px; }
        .news-date { font-size: 0.65rem; color: #666; font-weight: 700; margin-bottom: 10px; display: block; }
        .news-title { font-weight: 800; font-size: 1.1rem; line-height: 1.4; margin-bottom: 15px; color: white; }
        .news-excerpt { font-size: 0.8rem; color: #aaa; line-height: 1.6; margin-bottom: 20px; }
        
        .btn-read { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .btn-read:hover { text-decoration: underline; }

        /* --- FOOTER --- */
        .footer-sk { text-align: center; margin-top: 80px; font-size: 0.6rem; font-weight: 700; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; }

        @media (max-width: 768px) {
            .hero-news { padding: 60px 0; }
            .btn-filter { padding: 8px 15px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="hero-news">
        <div class="container">
            <div class=" konang-badge mb-3">Konang News</div>
            <h1 class="fw-black display-4 italic" style="letter-spacing: -2px;">SUARA & <span style="color:var(--accent)">SOROT MEDIA</span></h1>
            <p class="small opacity-50 uppercase tracking-widest" style="letter-spacing: 4px;">Informasi Terkini Aksi Nyata Kami</p>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill mt-4 px-4" style="font-size: 0.6rem; font-weight: 700;">KEMBALI KE MENU</a>
        </div>
    </div>

    <div class="container">
        <!-- FILTER BUTTONS -->
        <div class="filter-container">
            <button class="btn-filter active" onclick="filterNews('all')">Semua</button>
            <button class="btn-filter" onclick="filterNews('internal')">Warta Internal</button>
            <button class="btn-filter" onclick="filterNews('external')">Liputan Media</button>
        </div>

        <!-- NEWS GRID - akan diisi dari Firebase -->
        <div class="row g-4 mt-4" id="newsGrid">
          <div class="col-12 text-center py-5" id="newsLoading">
            <div style="color:#555;font-size:0.8rem;">Memuat berita...</div>
          </div>
        </div>

        <div class="footer-sk">@ Yayasan Sekola Konang Indonesia</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAepuZ8RHHuizqvXCbvBn4jyLxuWxwGey0",
            authDomain: "sekola-konang.firebaseapp.com",
            projectId: "sekola-konang",
            storageBucket: "sekola-konang.firebasestorage.app",
            messagingSenderId: "9338352073",
            appId: "1:9338352073:web:b56481b836888b1a8bf818"
        };
        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        function esc(str) { return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        let allNews = [];
        let currentFilter = 'all';

        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            try {
                const q = query(collection(db, "news"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                allNews = [];
                snap.forEach(docu => allNews.push({ id: docu.id, ...docu.data() }));
                renderNews();
            } catch(e) {
                grid.innerHTML = '<div class="col-12 text-center py-5" style="color:#555;">Gagal memuat berita.</div>';
            }
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            const filtered = currentFilter === 'all' ? allNews :
                             currentFilter === 'internal' ? allNews.filter(d => d.type !== 'external') :
                             allNews.filter(d => d.type === 'external');

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5" style="color:#555;font-size:0.82rem;">Belum ada berita.</div>';
                return;
            }

            grid.innerHTML = '';
            filtered.forEach(d => {
                const ext = d.type === 'external';
                const fallbackImg = 'https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=500';
                // Internal: pakai foto upload (base64 atau URL). External: fallback netral saja
                const imgSrc = ext
                  ? fallbackImg
                  : (d.image ? esc(d.image) : fallbackImg);
                const col = document.createElement('div');
                col.className = `col-md-6 col-lg-4 news-item ${ext ? 'external' : 'internal'}`;
                col.innerHTML = `
                    <div class="news-card">
                        <div class="news-img-wrapper">
                            <span class="type-badge ${ext ? 'bg-external' : 'bg-internal'}">${ext ? 'Media Luar' : 'Internal'}</span>
                            <img src="${imgSrc}" class="news-img" onerror="this.src='${fallbackImg}'" alt="${esc(d.title||'')}">
                        </div>
                        <div class="news-body">
                            <span class="news-date">${esc(d.date||'')}</span>
                            <h4 class="news-title">${esc(d.title||'')}</h4>
                            ${d.excerpt ? `<p class="news-excerpt">${esc(d.excerpt)}</p>` : ''}
                            ${ext
                              ? `<a href="${esc(d.url||d.link||'#')}" target="_blank" rel="noopener" class="btn-read">Lihat Sumber Berita <i class="fas fa-external-link-alt" style="font-size:0.65rem;margin-left:3px;"></i></a>`
                              : `<a href="news-detail.html?id=${d.id||''}" class="btn-read">Baca Selengkapnya →</a>`
                            }
                        </div>
                    </div>`;
                grid.appendChild(col);
            });
        }

        // Filter buttons
        function filterNews(type) {
            currentFilter = type;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderNews();
        }
        window.filterNews = filterNews;

        loadNews();
    </script>
</body>
</html>
