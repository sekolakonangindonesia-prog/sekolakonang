<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Tahunan - Sekola Konang</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --accent: #c6ff00; --dark: #050505; --card-bg: #121212; --border: #333; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: #eee; padding-bottom: 50px; }

        .hero-header { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1350&q=80') center/cover;
            padding: 60px 0 80px; text-align: center; border-bottom: 3px solid var(--accent);
        }
        .btn-back-nav { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-size: 0.7rem; font-weight: 800; border-radius: 50px; padding: 8px 20px; text-decoration: none; transition: 0.3s; }
        .btn-back-nav:hover { background: var(--accent); color: black; }

        .stat-box-container { margin-top: -40px; }
        .stat-box { background: white; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); color: #333; height: 100%; }
        .stat-box i { font-size: 1.5rem; margin-bottom: 10px; }
        .stat-box .val { font-size: 2rem; font-weight: 800; display: block; line-height: 1; }
        .stat-box label { font-size: 0.65rem; font-weight: 700; color: #888; text-transform: uppercase; margin-top: 8px; display: block;}

        .ui-card { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); padding: 20px; height: 100%; }
        .ui-title { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px;}
        #map-detail { height: 350px; width: 100%; border-radius: 10px; border: 1px solid #333; }

        .water-summary-box { background: linear-gradient(135deg, #0277bd, #01579b); color: white; border-radius: 15px; padding: 30px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; }

        .table-formula { background: white; border-radius: 10px; overflow: hidden; font-size: 0.75rem; color: black !important; }
        .table-formula thead th { background: #f1f1f1; font-weight: 800; text-transform: uppercase; font-size: 0.6rem; border: 1px solid #ddd; padding: 10px; }
        .table-formula td { border: 1px solid #eee; padding: 10px; }
        .formula-text { font-family: 'Courier New', monospace; color: #d32f2f; font-weight: bold; }
        .badge-dim { font-size: 0.6rem; background: #fff3e0; color: #e65100; padding: 2px 6px; border-radius: 4px; margin-top: 5px; display: inline-block; font-style: italic;}

        .gallery-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; border: 1px solid #333; cursor: pointer; }

        @media (max-width: 768px) { .stat-box { margin-bottom: 10px; } .display-5 { font-size: 1.6rem; } }
    </style>
</head>
<body>

    <div class="hero-header">
        <div class="container">
            <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/sekolakonang/refs/heads/main/LOGO%20YSKI.png" height="50" class="mb-3">
            <h1 class="fw-bold display-5" id="title-year">PROGRAM TAHUN ...</h1>
            <p id="title-loc" class="small opacity-50 uppercase tracking-widest">Memuat lokasi...</p>
            <a href="konservasi.html" class="btn-back-nav mt-3"><i class="fas fa-arrow-left me-2"></i> KEMBALI KE DASHBOARD</a>
        </div>
    </div>

    <div class="container">
        <div class="row g-3 stat-box-container mb-4">
            <div class="col-md-4"><div class="stat-box"><i class="fas fa-tree text-success"></i><span class="val" id="stat-trees">0</span><label>Pohon Ditanam</label></div></div>
            <div class="col-md-4"><div class="stat-box"><i class="fas fa-inbox" style="color:#795548"></i><span class="val" id="stat-rorak">0</span><label>Rorak Terbangun</label></div></div>
            <div class="col-md-4"><div class="stat-box"><i class="fas fa-water text-primary"></i><span class="val text-primary" id="stat-sipil">0 Unit</span><label>Sumur & Biopori</label></div></div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-7"><div class="ui-card"><div class="ui-title">Peta Sebaran</div><div id="map-detail"></div></div></div>
            <div class="col-lg-5"><div class="ui-card"><div class="ui-title">Komposisi Tanaman</div><div style="height: 250px;"><canvas id="chartSpecies"></canvas></div><div id="sp-list" class="mt-3" style="max-height: 150px; overflow-y: auto;"></div></div></div>
        </div>

        <div class="ui-card border-top border-4 border-primary">
            <div class="ui-title text-primary"><i class="fas fa-calculator me-2"></i> Analisis & Perhitungan Infiltrasi Air</div>
            <div class="row g-4 mb-4 align-items-center">
                <div class="col-lg-8"><div style="height: 250px;"><canvas id="chartWater"></canvas></div></div>
                <div class="col-lg-4">
                    <div class="water-summary-box shadow">
                        <i class="fas fa-tint fa-3x mb-3 opacity-25"></i>
                        <h2 class="fw-bold display-5 mb-0" id="total-water">0,00</h2>
                        <span class="fw-bold small uppercase tracking-widest">ML / Year Kumulatif</span>
                        <p class="small opacity-75 mt-2 mb-0">Total Replenished Water</p>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-formula align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Item & Dimensi</th>
                            <th style="width: 15%;">Volume</th>
                            <th style="width: 45%;">Formula Perhitungan (Manual Detail)</th>
                            <th class="text-end">Hasil (ML/Y)</th>
                        </tr>
                    </thead>
                    <tbody id="formula-body"></tbody>
                </table>
            </div>
        </div>

        <div class="ui-card mt-4 mb-5">
            <div class="ui-title"><i class="fas fa-camera me-2"></i> Dokumentasi Lapangan</div>
            <div class="row g-3" id="gallery"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAepuZ8RHHuizqvXCbvBn4jyLxuWxwGey0",
            authDomain: "sekola-konang.firebaseapp.com",
            projectId: "sekola-konang",
            storageBucket: "sekola-konang.firebasestorage.app",
            messagingSenderId: "9338352073",
            appId: "1:9338352073:web:b56481b836888b1a8bf818"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        async function loadData() {
            if(!docId) return;
            const docSnap = await getDoc(doc(db, "monitoring_reboisasi", docId));
            
            if (docSnap.exists()) {
                const d = docSnap.data();
                const s = d.stats;

                document.getElementById('title-year').innerText = "PROGRAM TAHUN " + d.year;
                document.getElementById('title-loc').innerText = d.location;
                document.getElementById('stat-trees').innerText = s.trees.toLocaleString('id-ID');
                document.getElementById('stat-rorak').innerText = s.rorak.toLocaleString('id-ID');
                document.getElementById('stat-sipil').innerText = `${s.sumur} Sumur + ${s.biopori} Biopori`;

                // Peta
                const map = L.map('map-detail', {zoomControl: false}).setView([-7.810, 112.908], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                if(d.areaPolygon) {
                    try {
                        const polyData = JSON.parse(d.areaPolygon);
                        L.polygon(polyData, {color: '#c6ff00', weight: 2, fillOpacity: 0.2}).addTo(map);
                        map.fitBounds(L.polygon(polyData).getBounds());
                    } catch(e) {}
                }
                
                if(d.points) {
                    d.points.forEach(p => {
                        if(p.koordinat) {
                            L.circleMarker([p.koordinat.latitude, p.koordinat.longitude], {radius: 5, color: '#ffab00', fillOpacity: 1}).addTo(map).bindPopup(p.nama_pohon);
                        }
                    });
                }

                // Species Chart
                const spKeys = Object.keys(d.species);
                const spVals = Object.values(d.species);
                new Chart(document.getElementById('chartSpecies'), {
                    type: 'doughnut',
                    data: { labels: spKeys, datasets: [{ data: spVals, backgroundColor: ['#1b5e20', '#c6ff00', '#2e7d32', '#66bb6a', '#a5d6a7', '#004d40', '#00c853'] }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
                const spList = document.getElementById('sp-list');
                spKeys.forEach((key, i) => {
                    spList.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.75rem; padding:4px 0; border-bottom:1px solid #222; opacity:0.8;"><span>${key}</span> <b>${spVals[i]}</b></div>`;
                });

                // Analisis Air
                renderAnalysis(d.year, s);

                // Gallery
                const gal = document.getElementById('gallery');
                if(d.photos && d.photos.length > 0) {
                    d.photos.forEach(src => { gal.innerHTML += `<div class="col-md-4 col-6"><img src="${src}" class="gallery-img" onclick="window.open(this.src)"></div>`; });
                }
            }
        }

        function renderAnalysis(year, s) {
            const tbody = document.getElementById('formula-body');
            const VWB = 0.02495;
            const TIME = 31.536;
            const RAIN = 163;

            let res = { tree: 0, rorak: 0, sumur: 0, biopori: 0 };
            
            if (year == 2024) {
                res.tree = (s.trees / 400) * 1.5;
                res.rorak = s.rorak * 0.17;
                res.sumur = s.sumur * 1.1;
                res.biopori = 0;
            } else {
                res.tree = (s.trees / 400) * VWB * TIME * 0.75;
                res.rorak = (s.rorak * 490 * 3 * RAIN) / 1000000;
                res.sumur = (s.sumur * 754 * 3 * RAIN) / 1000000;
                res.biopori = (s.biopori / 300) * 1.5;
            }

            const total = res.tree + res.rorak + res.sumur + res.biopori;
            document.getElementById('total-water').innerText = total.toLocaleString('id-ID', {minimumFractionDigits:2, maximumFractionDigits:2});

            const data = [
                { item: 'Pohon / Vegetasi', dim: `VWB: ${VWB} l/s/ha`, vol: '400 phn/ha', formula: `(${s.trees}/400)*${VWB}*${TIME}*75%`, val: res.tree },
                { item: 'Rorak (Trench)', dim: '1m x 0.7m x 0.7m', vol: '490 Liter', formula: `(${s.rorak}*490*3*${RAIN})/1jt`, val: res.rorak },
                { item: 'Sumur Resapan', dim: 'Dia 0.8m x T 1.5m', vol: '754 Liter', formula: `(${s.sumur}*754*3*${RAIN})/1jt`, val: res.sumur },
                { item: 'Biopori', dim: '-', vol: 'Std Biopori', formula: `(${s.biopori}/300)*1.5`, val: res.biopori }
            ];

            data.forEach(r => {
                if(r.val > 0 || r.val === 0) {
                    tbody.innerHTML += `<tr><td><b>${r.item}</b><br><span class="badge-dim">${r.dim}</span></td><td>${r.vol}</td><td class="formula-text">${r.formula}</td><td class="text-end fw-bold">${r.val.toLocaleString('id-ID', {minimumFractionDigits:2})}</td></tr>`;
                }
            });

            new Chart(document.getElementById('chartWater'), {
                type: 'bar',
                data: { labels: ['Pohon', 'Rorak', 'Sipil Lain'], datasets: [{ data: [res.tree.toFixed(2), res.rorak.toFixed(2), (res.sumur + res.biopori).toFixed(2)], backgroundColor: ['#4caf50', '#795548', '#0277bd'], borderRadius: 5 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        loadData();
    </script>
</body>
</html>
