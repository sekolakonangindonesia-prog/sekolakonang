<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Konservasi - Sekola Konang</title>
    
    <!-- Library CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #c6ff00; --dark: #050505; --card-bg: #121212; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: #eee; padding-bottom: 50px; }
        
        .header-section { padding: 60px 0 30px; text-align: center; border-bottom: 3px solid var(--accent); background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1350&q=80') center/cover; }
        .main-title { font-weight: 800; font-size: 1.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: -30px; padding: 0 15px; }
        .stat-card-mini { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .stat-card-mini i { color: var(--accent); font-size: 1.2rem; margin-bottom: 5px; }
        .stat-card-mini .num { display: block; font-size: 1.4rem; font-weight: 800; color: white; }
        .stat-card-mini label { font-size: 0.55rem; text-transform: uppercase; font-weight: 700; color: #777; letter-spacing: 1px; }

        .custom-card { background: var(--card-bg); border-radius: 20px; border: 1px solid #222; overflow: hidden; margin-bottom: 20px; }
        .card-header-neon { background: #ffab00; padding: 10px 20px; font-weight: 800; color: #000; font-size: 0.75rem; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

        #map { height: 400px; width: 100%; background: #222; }
        .chart-container { position: relative; height: 220px; width: 100%; padding: 10px; }

        .table-custom { background: white; color: black; margin-bottom: 0; font-size: 0.8rem; }
        .table-custom th { background: #f8f9fa; font-weight: 800; text-transform: uppercase; font-size: 0.65rem; padding: 12px; border-bottom: 2px solid #ddd; }
        .table-custom td { padding: 10px; vertical-align: middle; border-bottom: 1px solid #eee; }
        .btn-detail-neon { border: 1px solid #333; font-size: 0.6rem; font-weight: 800; padding: 5px 12px; border-radius: 50px; text-decoration: none; color: #444; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            #map { height: 300px; }
            .main-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- TOMBOL MIGRASI -->
    <button id="btnMigrasi" style="position:fixed; top:100px; right:20px; z-index:9999; padding:15px; background:red; color:white; font-weight:bold; border-radius:10px; border:2px solid white; cursor:pointer;">
        🚀 PINDAHKAN SEMUA DATA KE FIREBASE
    </button>
    
    <div class="header-section">
        <div class="container">
            <h1 class="main-title">Sebaran Penanaman & Konservasi</h1>
            <p class="small uppercase tracking-widest text-white-50" style="letter-spacing: 3px;">Monitoring Reboisasi dan Sipil Teknis</p>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill mt-2 px-4" style="font-size: 0.6rem; font-weight: 700;">KEMBALI KE MENU</a>
        </div>
    </div>

    <div class="container-fluid px-md-5">
        <div class="stats-grid mb-4">
            <div class="stat-card-mini"><i class="fas fa-tree"></i><span class="num" id="t-pohon">0</span><label>Pohon</label></div>
            <div class="stat-card-mini"><i class="fas fa-inbox"></i><span class="num" id="t-rorak">0</span><label>Rorak</label></div>
            <div class="stat-card-mini"><i class="fas fa-faucet"></i><span class="num" id="t-sumur">0</span><label>Sumur</label></div>
            <div class="stat-card-mini"><i class="fas fa-fill-drip"></i><span class="num" id="t-biopori">0</span><label>Biopori</label></div>
            <div class="stat-card-mini"><i class="fas fa-tint"></i><span class="num" id="t-air">0.0</span><label>Infiltrasi (ML)</label></div>
        </div>

        <div class="custom-card">
            <div class="card-header-neon">
                <span><i class="fas fa-map-marked-alt me-2"></i> Peta Sebaran & Delineasi Area</span>
                <span class="badge bg-dark">Leaflet Maps</span>
            </div>
            <div id="map"></div>
        </div>

        <div class="row g-3">
            <div class="col-lg-8"><div class="custom-card p-3"><label class="small fw-bold text-white-50 mb-3 uppercase">Tren Penanaman Pohon</label><div class="chart-container"><canvas id="chartTrees"></canvas></div></div></div>
            <div class="col-lg-4"><div class="custom-card p-3"><label class="small fw-bold text-white-50 mb-3 uppercase">Komposisi Tanaman</label><div class="chart-container"><canvas id="chartSpecies"></canvas></div></div></div>
            <div class="col-lg-6"><div class="custom-card p-3"><label class="small fw-bold text-white-50 mb-3 uppercase">Sipil Teknis Terakumulasi</label><div class="chart-container"><canvas id="chartSipil"></canvas></div></div></div>
            <div class="col-lg-6"><div class="custom-card p-3"><label class="small fw-bold text-white-50 mb-3 uppercase">Infiltrasi Air (ML/Y)</label><div class="chart-container"><canvas id="chartWater"></canvas></div></div></div>
        </div>

        <div class="custom-card mt-3">
            <div class="card-header-neon" style="background:#333; color:white;">
                <span><i class="fas fa-history me-2"></i> Riwayat Program Per Tahun</span>
            </div>
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>Tahun</th>
                            <th>Lokasi Program</th>
                            <th class="text-center">Pohon</th>
                            <th class="text-center">Rorak</th>
                            <th class="text-center">Sumur</th>
                            <th class="text-center">Biopori</th>
                            <th class="text-end">Hasil (ML)</th>
                            <th class="text-center">Opsi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- SCRIPTS PENTING -->
    <script src="database_planting.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAepuZ8RHHuizqvXCbvBn4jyLxuWxwGey0",
        authDomain: "sekola-konang.firebaseapp.com",
        projectId: "sekola-konang",
        storageBucket: "sekola-konang.firebasestorage.app",
        messagingSenderId: "9338352073",
        appId: "1:9338352073:web:b56481b836888b1a8bf818"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('id');

    async function loadYearDetail() {
        if(!docId) return;
        try {
            const docSnap = await getDoc(doc(db, "monitoring_reboisasi", docId));
            
            if (docSnap.exists()) {
                const d = docSnap.data();
                const s = d.stats;

                // 1. Update Judul & Stats Atas
                document.getElementById('title-year').innerText = "PROGRAM TAHUN " + d.year;
                document.getElementById('title-loc').innerText = d.location;
                document.getElementById('stat-trees').innerText = s.trees.toLocaleString('id-ID');
                document.getElementById('stat-rorak').innerText = s.rorak.toLocaleString('id-ID');
                document.getElementById('stat-sipil').innerText = `${s.sumur} Sumur + ${s.biopori} Biopori`;

                // 2. Inisialisasi Peta
                const map = L.map('map-detail', {zoomControl: false}).setView([-7.810, 112.908], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                // PETA: Gambar Polygon (Bongkar teks JSON)
                if(d.areaPolygon) {
                    try {
                        const polyData = JSON.parse(d.areaPolygon);
                        const layer = L.polygon(polyData, {color: '#c6ff00', weight: 2, fillOpacity: 0.2}).addTo(map);
                        map.fitBounds(layer.getBounds());
                    } catch(e) { console.error("Gagal load area", e); }
                }

                // PETA: Gambar Titik (Akses GeoPoint)
                if(d.points) {
                    d.points.forEach(p => {
                        if(p.koordinat) {
                            L.circleMarker([p.koordinat.latitude, p.koordinat.longitude], {
                                radius: 5, color: '#ffab00', fillOpacity: 1
                            }).addTo(map).bindPopup(p.nama_pohon);
                        }
                    });
                }

                // 3. Diagram Komposisi Tanaman (Warna-warni)
                const spKeys = Object.keys(d.species);
                const spVals = Object.values(d.species);
                new Chart(document.getElementById('chartSpecies'), {
                    type: 'doughnut',
                    data: {
                        labels: spKeys,
                        datasets: [{ 
                            data: spVals, 
                            backgroundColor: ['#1b5e20', '#c6ff00', '#2e7d32', '#66bb6a', '#a5d6a7', '#81c784', '#4caf50'] 
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });

                const spList = document.getElementById('sp-list');
                spKeys.forEach((key, index) => {
                    spList.innerHTML += `<div class="sp-list-item"><span>${key}</span> <b>${spVals[index]}</b></div>`;
                });

                // 4. Analisis & Rumus
                renderAnalysis(d.year, s);

                // 5. Galeri
                const gal = document.getElementById('gallery');
                if(d.photos) {
                    d.photos.forEach(src => {
                        gal.innerHTML += `<div class="col-md-4 col-6"><img src="${src}" class="gallery-img"></div>`;
                    });
                }
            }
        } catch (err) { console.error("Gagal muat detail:", err); }
    }

    function renderAnalysis(year, s) {
        const tbody = document.getElementById('formula-body');
        const RAIN_DAYS = 163;
        const TIME_FACTOR = 31.536;
        const VWB = 0.02495;

        // Hitung per item
        const resPohon = (s.trees / 400) * VWB * TIME_FACTOR * 0.75;
        const resRorak = (s.rorak * 490 * 3 * RAIN_DAYS) / 1000000;
        const resSumur = (s.sumur * 754 * 3 * RAIN_DAYS) / 1000000;
        const resBiopori = (s.biopori / 300) * 1.5;
        
        const total = resPohon + resRorak + resSumur + resBiopori;
        document.getElementById('total-water').innerText = total.toLocaleString('id-ID', {minimumFractionDigits:2});

        const dataRows = [
            { item: 'Pohon / Vegetasi', dim: `VWB: ${VWB} l/s/ha`, vol: 'Asumsi 400 phn/ha', formula: `(${s.trees.toLocaleString()}/400)*${VWB}*${TIME_FACTOR}*75%`, val: resPohon },
            { item: 'Rorak (Trench)', dim: '1m x 0.7m x 0.7m', vol: '490 Liter', formula: `(${s.rorak.toLocaleString()}*490*3*${RAIN_DAYS})/1jt`, val: resRorak },
            { item: 'Sumur Resapan', dim: 'Dia 0.8m x T 1.5m', vol: '754 Liter', formula: `(${s.sumur.toLocaleString()}*754*3*${RAIN_DAYS})/1jt`, val: resSumur },
            { item: 'Biopori', dim: 'Std Biopori', vol: '1.5 ML', formula: `(${s.biopori.toLocaleString()}/300)*1.5`, val: resBiopori }
        ];

        dataRows.forEach(r => {
            if(r.val > 0) {
                tbody.innerHTML += `<tr>
                    <td><b>${r.item}</b><br><span class="badge-dim">${r.dim}</span></td>
                    <td>${r.vol}</td>
                    <td class="formula-text">${r.formula}</td>
                    <td class="text-end fw-bold">${r.val.toLocaleString('id-ID', {minimumFractionDigits:2})}</td>
                </tr>`;
            }
        });

        // Diagram Batang Air
        new Chart(document.getElementById('chartWater'), {
            type: 'bar',
            data: {
                labels: ['Pohon', 'Rorak', 'Sipil Lain'],
                datasets: [{ 
                    data: [resPohon.toFixed(2), resRorak.toFixed(2), (resSumur + resBiopori).toFixed(2)], 
                    backgroundColor: ['#43a047', '#795548', '#0277bd'] 
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    loadYearDetail();
</script>
</script>
    </script>
</body>
</html>
